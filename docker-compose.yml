version: '3.8'

services:
  api:
    build: .
    container_name: ifinu-radio-api
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DB_HOST: 172.17.0.1
      DB_PORT: 5432
      DB_USER: ifinu_user
      DB_PASSWORD: ifinu_password
      DB_NAME: ifinu_radio
      ENV: production
      STREAM_BUFFER_SIZE: 65536
      STREAM_RETRY_ATTEMPTS: 3
      SYNC_INTERVAL: 6h
      ADMIN_API_KEY: ${ADMIN_API_KEY:-change-this-in-production}
      ALLOWED_ORIGINS: https://ifinu.io,https://www.ifinu.io
    extra_hosts:
      - "host.docker.internal:host-gateway"
    network_mode: bridge
    restart: unless-stopped
